<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <img src="logo.jpeg" alt="Ice Cream Logo">
    <h1>Sweet Scoop Ice Cream</h1>
</header>

<div>
    <nav>
        <ul>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</div>

<main>
    <section>

    <h1>Signup</h1>

    <form id="signup-form" action="login.html">
        Username:<br>
        <input type="text" id="username"><br>
        <br>

        Email:<br>
        <input type="text" id="email"><br>
        <br>

        Password:<br>
        <input type="password" id="password"><br>
        <br>

        Confirm Password:<br>
        <input type="password" id="confirm-password"><br>
        <br><br>

        <button type="submit" class="signup-button">Sign Up</button>

        <div id="signup-message-box" class="dynamic-box" aria-live="polite"></div>

    </form>
    </section>

</main>

<script src="signup.js"></script>

</body>
</html>
